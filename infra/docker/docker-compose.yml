services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cardwise
      POSTGRES_PASSWORD: cardwise
      POSTGRES_DB: cardwise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://cardwise:cardwise@db:5432/cardwise
      APP_PASSWORD: ${APP_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
      NODE_ENV: production
      FRONTEND_URL: http://localhost
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
