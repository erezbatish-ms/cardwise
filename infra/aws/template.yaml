AWSTemplateFormatVersion: '2010-09-09'
Description: CardWise — Credit card expense analyzer infrastructure

Parameters:
  BackendImage:
    Type: String
    Description: ECR image URI for the backend container
  DBPassword:
    Type: String
    NoEcho: true
    Description: PostgreSQL master password
  AppPassword:
    Type: String
    NoEcho: true
    Description: Application login password

Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: cardwise-vpc

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']

  # RDS PostgreSQL
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: CardWise DB subnets
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  Database:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: cardwise-db
      Engine: postgres
      EngineVersion: '16'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      MasterUsername: cardwise
      MasterUserPassword: !Ref DBPassword
      DBName: cardwise
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      StorageEncrypted: true
      DeletionProtection: true

  # ECS Fargate for Backend
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: cardwise-cluster

  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: cardwise-backend
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ContainerDefinitions:
        - Name: backend
          Image: !Ref BackendImage
          PortMappings:
            - ContainerPort: 3001
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3001'
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DBUrlSecret
            - Name: APP_PASSWORD
              ValueFrom: !Ref AppPasswordSecret

  BackendService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          AssignPublicIp: ENABLED

  # S3 + CloudFront for Frontend
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'cardwise-frontend-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: ''
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD]
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false

  # Secrets Manager
  DBUrlSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: cardwise/database-url
      SecretString: !Sub 'postgresql://cardwise:${DBPassword}@${Database.Endpoint.Address}:5432/cardwise'

  AppPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: cardwise/app-password
      SecretString: !Ref AppPassword

Outputs:
  BackendCluster:
    Value: !Ref ECSCluster
  FrontendURL:
    Value: !GetAtt CloudFrontDistribution.DomainName
  DatabaseEndpoint:
    Value: !GetAtt Database.Endpoint.Address
