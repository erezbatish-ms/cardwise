name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cardwise
          POSTGRES_PASSWORD: cardwise
          POSTGRES_DB: cardwise_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cardwise"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx prisma generate
      - run: npm test
        env:
          DATABASE_URL: postgresql://cardwise:cardwise@localhost:5432/cardwise_test
          APP_PASSWORD: testpassword
          SESSION_SECRET: test-secret

  lint-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend, lint-and-test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cardwise
          POSTGRES_PASSWORD: cardwise
          POSTGRES_DB: cardwise_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cardwise"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Setup database
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx tsx src/prisma/seed.ts
        env:
          DATABASE_URL: postgresql://cardwise:cardwise@localhost:5432/cardwise_test
      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          DATABASE_URL: postgresql://cardwise:cardwise@localhost:5432/cardwise_test
          APP_PASSWORD: testpassword
          SESSION_SECRET: test-secret
          AZURE_OPENAI_ENDPOINT: http://localhost:mock
          AZURE_OPENAI_API_KEY: test-key
          BASE_URL: http://localhost:5173
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
