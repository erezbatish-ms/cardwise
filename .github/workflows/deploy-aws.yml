name: Deploy to AWS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend Image
        working-directory: backend
        run: |
          docker build -f ../infra/docker/Dockerfile.backend -t ${{ steps.ecr.outputs.registry }}/cardwise-backend:${{ github.sha }} .
          docker push ${{ steps.ecr.outputs.registry }}/cardwise-backend:${{ github.sha }}

      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --template-file infra/aws/template.yaml \
            --stack-name cardwise \
            --parameter-overrides \
              BackendImage=${{ steps.ecr.outputs.registry }}/cardwise-backend:${{ github.sha }} \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset

      - name: Build & Deploy Frontend to S3
        working-directory: frontend
        run: |
          npm ci
          npm run build
          aws s3 sync dist/ s3://cardwise-frontend-${{ secrets.AWS_ACCOUNT_ID }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
